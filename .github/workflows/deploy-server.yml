name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd ~/metro-nomedeul
            git pull origin main
            cd ~
            docker compose up -d --build metronomdeul-server
            sleep 15
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "404\|200" || exit 1
            echo "Deploy successful!"
