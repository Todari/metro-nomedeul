services:
  db:
    image: postgres:16-alpine
    container_name: metronomdeul-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: metronomdeul
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - metronomdeul_network

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: metronomdeul-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/metronomdeul?schema=public
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - metronomdeul_network

  nginx:
    image: nginx:alpine
    container_name: metronomdeul-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - metronomdeul_network

  certbot:
    image: certbot/certbot
    container_name: metronomdeul-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:

networks:
  metronomdeul_network:
