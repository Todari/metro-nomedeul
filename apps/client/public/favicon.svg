<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 브랜드 컬러 라운드 스퀘어: 작은 사이즈에서도 즉시 인식되도록 -->
  <rect width="64" height="64" rx="14" fill="#ea580c"/>

  <!-- "들" (복수)을 표현: 두 개의 메트로놈 펜듈럼이 한 피봇에서 만남 -->
  <line x1="20" y1="14" x2="32" y2="48" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="44" y1="14" x2="32" y2="48" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 펜듈럼 끝의 추 (박자의 시각화) -->
  <circle cx="20" cy="14" r="4.5" fill="white"/>
  <circle cx="44" cy="14" r="4.5" fill="white"/>

  <!-- 공통 피봇: 동기화의 중심 -->
  <circle cx="32" cy="48" r="3.5" fill="white"/>

  <!-- 동기화 펄스 링: 같은 박자가 퍼져나감 -->
  <circle cx="32" cy="48" r="9" fill="none" stroke="white" stroke-width="1.5" opacity="0.45"/>
</svg>
