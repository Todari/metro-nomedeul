services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: metronomdeul-server
    environment:
      - PORT=${PORT:-3000}
      - DATABASE_URL=postgresql://metronomdeul:metronomdeul@postgres:5432/metronomdeul
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: metronomdeul-postgres
    environment:
      POSTGRES_USER: metronomdeul
      POSTGRES_PASSWORD: metronomdeul
      POSTGRES_DB: metronomdeul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metronomdeul"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
